<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaMaster Async</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <div id="root" class="flex-grow"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const TOOLS = [
            { id: 'heic-jpg', title: 'HEIC → JPG', icon: 'image', color: 'bg-blue-500', description: 'iPhoneの写真を一般的な形式に変換' },
            { id: 'm4a-mp3', title: 'M4A → MP3', icon: 'music', color: 'bg-purple-500', description: 'Apple録音データをMP3に変換' },
            { id: 'mp4-mp3', title: '動画 → MP3', icon: 'volume-2', color: 'bg-orange-500', description: '動画から音声のみを抽出' },
            { id: 'jpeg-pdf', title: '画像 → PDF', icon: 'file-text', color: 'bg-red-500', description: '複数の画像を1つのPDFに結合' },
            { id: 'pdf-png', title: 'PDF → PNG', icon: 'files', color: 'bg-emerald-500', description: 'PDFの各ページを画像に変換' },
            { id: 'youtube', title: 'YouTube 保存', icon: 'youtube', color: 'bg-rose-600', description: '動画・音声を最高画質で保存 (Colab経由)' },
            { id: 'file-download', title: 'ファイルDL', icon: 'download', color: 'bg-indigo-600', description: 'download_files内のファイルを選択して取得' },
        ];

        function App() {
            const [selectedTool, setSelectedTool] = useState(null);
            const [files, setFiles] = useState([]);
            const [youtubeUrl, setYoutubeUrl] = useState("");
            const [youtubeFormat, setYoutubeFormat] = useState('mp3');
            const [status, setStatus] = useState('idle');
            const [progress, setProgress] = useState(0);
            const [lastLog, setLastLog] = useState("");
            const [downloadUrl, setDownloadUrl] = useState(null);
            const [error, setError] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [availableFiles, setAvailableFiles] = useState([]);
            const [selectedDownloadFiles, setSelectedDownloadFiles] = useState([]);
            const [showFilePicker, setShowFilePicker] = useState(false);

            const pollInterval = useRef(null);

            useEffect(() => {
                return () => {
                    if (pollInterval.current) clearInterval(pollInterval.current);
                };
            }, []);

            const handleFileChange = (e) => setFiles(Array.from(e.target.files));
            const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
            const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); };
            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                const dropped = Array.from(e.dataTransfer.files);
                if (dropped.length > 0) setFiles(dropped);
            };

            const resetByTool = (tool) => {
                setSelectedTool(tool);
                setFiles([]);
                setYoutubeUrl("");
                setStatus('idle');
                setProgress(0);
                setLastLog("");
                setDownloadUrl(null);
                setError(null);
                setSelectedDownloadFiles([]);
                setShowFilePicker(false);
            };

            const openFilePicker = async () => {
                setError(null);
                try {
                    const res = await fetch('/api/download-files');
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || 'ファイル一覧の取得に失敗しました');
                    setAvailableFiles(data.files || []);
                    setShowFilePicker(true);
                } catch (err) {
                    setError(err.message || '通信エラーが発生しました');
                }
            };

            const toggleDownloadFile = (name) => {
                setSelectedDownloadFiles((prev) => prev.includes(name) ? prev.filter((n) => n !== name) : [...prev, name]);
            };

            const startFileDownload = async () => {
                if (selectedDownloadFiles.length === 0) return;
                setStatus('uploading');
                setProgress(30);
                setLastLog('ZIPを作成しています...');
                setError(null);

                try {
                    const res = await fetch('/api/download-files', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ files: selectedDownloadFiles }),
                    });

                    if (!res.ok) {
                        const data = await res.json();
                        throw new Error(data.detail || 'ダウンロード準備に失敗しました');
                    }

                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'selected_files.zip';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);

                    setStatus('completed');
                    setProgress(100);
                    setLastLog('完了しました');
                } catch (err) {
                    setStatus('failed');
                    setProgress(100);
                    setLastLog('処理に失敗しました');
                    setError(err.message || '通信エラーが発生しました');
                }
            };

            const startPolling = (tid) => {
                if (pollInterval.current) clearInterval(pollInterval.current);
                pollInterval.current = setInterval(async () => {
                    try {
                        const res = await fetch(`/api/status/${tid}`);
                        const data = await res.json();
                        setStatus(data.status);
                        setProgress(data.progress || 0);
                        setLastLog(data.last_log || data.error || "");

                        if (data.status === 'completed') {
                            clearInterval(pollInterval.current);
                            setDownloadUrl(`/api/download/${tid}`);
                        }
                        if (data.status === 'failed') {
                            clearInterval(pollInterval.current);
                            setError(data.error || '処理に失敗しました');
                        }
                    } catch {
                        clearInterval(pollInterval.current);
                        setStatus('failed');
                        setError('進捗確認に失敗しました');
                    }
                }, 1500);
            };

            const startProcessing = async () => {
                if (selectedTool.id === 'file-download') return startFileDownload();
                if (selectedTool.id === 'youtube' && !youtubeUrl) return;
                if (selectedTool.id !== 'youtube' && files.length === 0) return;

                setStatus('uploading');
                setProgress(10);
                setLastLog('サーバーにリクエストを送信中...');
                setDownloadUrl(null);
                setError(null);

                const formData = new FormData();
                formData.append('tool_id', selectedTool.id);

                if (selectedTool.id === 'youtube') {
                    formData.append('url', youtubeUrl);
                    formData.append('output_format', youtubeFormat);
                } else {
                    files.forEach(file => formData.append('files', file));
                    formData.append('output_format', 'mp3');
                }

                try {
                    const res = await fetch('/api/convert', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.task_id) startPolling(data.task_id);
                    else throw new Error(data.error || "リクエストに失敗しました");
                } catch (err) {
                    setStatus('failed');
                    setError(err.message || '通信エラーが発生しました');
                    setLastLog('処理に失敗しました');
                }
            };

            const backToInput = () => {
                setStatus('idle');
                setProgress(0);
                setDownloadUrl(null);
                setError(null);
                setLastLog('');
            };

            const renderToolInput = () => {
                if (selectedTool.id === 'youtube') {
                    return (
                        <div className="space-y-4">
                            <textarea
                                value={youtubeUrl}
                                onChange={(e) => setYoutubeUrl(e.target.value)}
                                placeholder="YouTube URLを1行ずつ入力"
                                className="w-full h-40 p-4 border border-slate-200 rounded-2xl"
                            />
                            <div className="flex gap-3">
                                <button onClick={() => setYoutubeFormat('mp3')} className={`px-4 py-2 rounded-xl font-bold ${youtubeFormat === 'mp3' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>MP3</button>
                                <button onClick={() => setYoutubeFormat('mp4')} className={`px-4 py-2 rounded-xl font-bold ${youtubeFormat === 'mp4' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>MP4</button>
                            </div>
                        </div>
                    );
                }

                if (selectedTool.id === 'file-download') {
                    return (
                        <div className="space-y-4">
                            <button
                                onClick={openFilePicker}
                                className="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-indigo-600"
                            >
                                Select files
                            </button>

                            {showFilePicker && (
                                <div className="border border-slate-200 rounded-2xl p-4 bg-white max-h-56 overflow-auto">
                                    {availableFiles.length === 0 ? (
                                        <p className="text-slate-400 text-sm">download_files にファイルがありません。</p>
                                    ) : (
                                        <div className="space-y-2">
                                            {availableFiles.map((name) => (
                                                <label key={name} className="flex items-center gap-2 text-sm text-slate-700">
                                                    <input
                                                        type="checkbox"
                                                        checked={selectedDownloadFiles.includes(name)}
                                                        onChange={() => toggleDownloadFile(name)}
                                                    />
                                                    <span>{name}</span>
                                                </label>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    );
                }

                return (
                    <div
                        className={`border-2 border-dashed rounded-3xl p-12 text-center transition-all ${
                            isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 bg-slate-50 hover:border-indigo-400'
                        }`}
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                    >
                        <input type="file" multiple className="hidden" id="fileInput" onChange={handleFileChange} />
                        <label htmlFor="fileInput" className="cursor-pointer block">
                            <Icon name="upload-cloud" className={`w-12 h-12 mx-auto mb-4 ${isDragging ? 'text-indigo-500' : 'text-slate-300'}`} />
                            <p className="text-slate-600 font-bold mb-1">
                                {files.length > 0 ? `${files.length}個のファイルを選択中` : isDragging ? 'ここにドロップ' : 'ファイルをドラッグ＆ドロップ'}
                            </p>
                            <p className="text-slate-400 text-sm font-medium">またはクリックしてファイルを選択</p>
                        </label>
                    </div>
                );
            };

            const isRunDisabled = status !== 'idle' || (
                selectedTool.id === 'youtube' ? !youtubeUrl :
                selectedTool.id === 'file-download' ? selectedDownloadFiles.length === 0 :
                files.length === 0
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <main className="max-w-6xl w-full mx-auto px-4 py-10 flex-grow">
                        <h1 className="text-3xl font-black text-slate-900 mb-8">MediaMaster Async</h1>

                        {!selectedTool && (
                            <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                                {TOOLS.map((tool) => (
                                    <button key={tool.id} onClick={() => resetByTool(tool)} className="text-left bg-white rounded-2xl p-5 border border-slate-100 hover:shadow-md">
                                        <div className={`w-10 h-10 rounded-xl ${tool.color} text-white flex items-center justify-center mb-3`}><Icon name={tool.icon} className="w-5 h-5" /></div>
                                        <h2 className="font-bold text-slate-900 mb-1">{tool.title}</h2>
                                        <p className="text-sm text-slate-500">{tool.description}</p>
                                    </button>
                                ))}
                            </div>
                        )}

                        {selectedTool && (
                            <div className="max-w-2xl mx-auto">
                                <button onClick={() => setSelectedTool(null)} className="mb-4 text-sm text-slate-500 hover:text-slate-800">← 機能一覧に戻る</button>
                                <div className="bg-white rounded-3xl p-6 border border-slate-100 space-y-6">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-xl ${selectedTool.color} text-white flex items-center justify-center`}><Icon name={selectedTool.icon} className="w-5 h-5" /></div>
                                        <div>
                                            <h2 className="text-xl font-black text-slate-900">{selectedTool.title}</h2>
                                            <p className="text-sm text-slate-500">{selectedTool.description}</p>
                                        </div>
                                    </div>

                                    {status === 'idle' ? (
                                        <>
                                            {renderToolInput()}
                                            <button
                                                onClick={startProcessing}
                                                disabled={isRunDisabled}
                                                className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-indigo-600 disabled:bg-slate-200"
                                            >
                                                {selectedTool.id === 'file-download' ? '選択したファイルをダウンロード' : '処理開始'}
                                            </button>
                                        </>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100">
                                                <div className="flex justify-between text-sm font-bold mb-2">
                                                    <span className={status === 'failed' ? 'text-rose-600' : 'text-indigo-600'}>{status === 'completed' ? '完了しました' : lastLog}</span>
                                                    <span className="text-slate-400">{progress}%</span>
                                                </div>
                                                <div className="w-full bg-slate-200 rounded-full h-3 overflow-hidden">
                                                    <div className={`h-full ${status === 'failed' ? 'bg-rose-500' : 'bg-indigo-600'}`} style={{ width: `${progress}%` }}></div>
                                                </div>
                                            </div>

                                            {error && <div className="p-4 bg-rose-50 border border-rose-100 rounded-2xl text-rose-600 font-bold text-sm">{error}</div>}

                                            <div className="flex gap-3">
                                                <button onClick={backToInput} className="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold hover:bg-slate-200">入力に戻る</button>
                                                {downloadUrl && (
                                                    <a href={downloadUrl} className="flex-1 bg-emerald-500 text-white py-3 rounded-2xl font-bold text-center hover:bg-emerald-600">ダウンロード</a>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center border-t border-slate-100 text-sm text-slate-400">
                        © {new Date().getFullYear()} <span className="text-slate-900 font-black">HatakeyamaTechnology</span>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
